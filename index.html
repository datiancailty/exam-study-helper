<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="支持答对自动下一题、答错停留学习的考试刷题工具">
  <title>刷题学习助手</title>
  <style>
:root{--blue:#2563eb;--blue2:#eff6ff;--navy:#172554;--muted:#64748b;--line:#e2e8f0;--green:#16a34a;--green-bg:#f0fdf4;--orange:#ea580c;--orange-bg:#fff7ed;--bg:#f5f8fd}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#172033;background:var(--bg);min-height:100vh}.topbar{height:84px;background:#fff;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr minmax(320px,520px) 1fr;align-items:center;padding:0 38px;gap:36px}.brand{font-size:20px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:11px}.brand-icon{display:grid;place-items:center;width:34px;height:34px;background:var(--blue);border-radius:10px;color:#fff}.progress-copy{display:flex;justify-content:space-between;font-size:13px;margin-bottom:9px}.progress-copy span{color:var(--muted)}.progress-track{height:7px;background:#eaf0f8;border-radius:99px;overflow:hidden}.progress-bar{height:100%;width:20%;background:linear-gradient(90deg,#3b82f6,#2563eb);border-radius:99px;transition:width .3s}.header-actions{display:flex;justify-content:flex-end;gap:10px}button{font:inherit;cursor:pointer;border:0}.ghost,.secondary{background:#fff;border:1px solid var(--line);color:#475569;border-radius:10px}.small{padding:9px 13px}.layout{max-width:1500px;margin:30px auto;padding:0 30px;display:grid;grid-template-columns:230px minmax(520px,1fr) 265px;gap:24px}.panel,.question-card{background:#fff;border:1px solid #e7edf6;border-radius:16px;box-shadow:0 8px 30px rgba(30,64,175,.05)}.panel{padding:22px}.panel h2{font-size:16px;margin:0}.panel-title,.mode-head{display:flex;justify-content:space-between;align-items:center}.panel-title span{font-size:13px;color:var(--muted)}.question-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:24px 0}.q-number{aspect-ratio:1;border-radius:50%;background:#f1f5f9;color:#64748b;font-size:13px;border:1px solid transparent}.q-number.current{color:#fff;background:var(--blue);box-shadow:0 5px 12px rgba(37,99,235,.28)}.q-number.done{background:#dcfce7;color:#15803d}.q-number.wrong{background:#ffedd5;color:#c2410c}.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);padding-top:18px;border-top:1px solid #edf1f6}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}.dot.done{background:#86efac}.dot.current{background:var(--blue)}.dot.todo{background:#cbd5e1}.sheet-tip{font-size:11px;color:#94a3b8;margin-top:16px;text-align:center}.question-card{padding:34px 38px;min-height:650px;display:flex;flex-direction:column}.tags{display:flex;gap:8px}.tag{font-size:12px;padding:5px 10px;background:#f1f5f9;color:#64748b;border-radius:99px}.tag.blue{color:var(--blue);background:var(--blue2)}h1{font-size:25px;line-height:1.55;margin:24px 0 26px;color:#172033}.options{display:grid;gap:14px}.option{width:100%;display:flex;align-items:center;text-align:left;padding:17px 18px;background:#fff;border:1.5px solid var(--line);border-radius:12px;transition:.16s;color:#334155}.option:hover{border-color:#93b4fb;background:#fafcff}.option.selected{border-color:var(--blue);background:var(--blue2);color:#1e40af}.option.correct{border-color:#22c55e;background:var(--green-bg);color:#166534}.option.incorrect{border-color:#f97316;background:var(--orange-bg);color:#9a3412}.letter{width:30px;height:30px;display:grid;place-items:center;border:1px solid #cbd5e1;border-radius:50%;margin-right:14px;font-weight:700}.selected .letter{background:var(--blue);border-color:var(--blue);color:#fff}.correct .letter{background:#22c55e;border-color:#22c55e;color:#fff}.incorrect .letter{background:#f97316;border-color:#f97316;color:#fff}.hint{color:#94a3b8;font-size:13px;margin:18px 2px}.feedback{border-radius:12px;padding:17px 19px;margin:2px 0 14px}.feedback.success{background:var(--green-bg);border:1px solid #bbf7d0}.feedback.error{background:var(--orange-bg);border:1px solid #fed7aa}.feedback-head{display:flex;gap:9px}.feedback p{font-size:13px;line-height:1.65;margin:8px 0 0}.hidden{display:none}.bottom-actions{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;margin-top:auto;padding-top:24px;border-top:1px solid #edf1f6}.primary,.secondary{padding:12px 18px;border-radius:10px;font-weight:650}.primary{background:var(--blue);color:#fff;box-shadow:0 5px 14px rgba(37,99,235,.22)}.primary:disabled,.secondary:disabled{opacity:.45;cursor:not-allowed}.auto-note{font-size:12px;color:#64748b;text-align:center}.auto-note i{display:inline-block;width:7px;height:7px;background:#22c55e;border-radius:50%;margin-right:6px}.right-column{display:grid;gap:20px;align-content:start}.switch input{display:none}.switch span{display:block;width:42px;height:24px;border-radius:99px;background:#cbd5e1;position:relative}.switch span:after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}.switch input:checked+span{background:var(--blue)}.switch input:checked+span:after{left:21px}.rule{display:flex;gap:12px;align-items:center;padding:15px 0;border-bottom:1px solid #edf1f6}.rule:last-child{border:0}.rule b{width:28px;height:28px;border-radius:8px;display:grid;place-items:center}.rule div{display:grid;gap:3px}.rule strong{font-size:13px}.rule small{font-size:11px;color:var(--muted)}.rule.success b{background:#dcfce7;color:var(--green)}.rule.warning b{background:#ffedd5;color:var(--orange)}.rule.neutral b{background:#e0e7ff;color:#4f46e5}.stats h2{margin-bottom:12px}.stat-row{display:flex;justify-content:space-between;padding:11px 0;color:var(--muted);font-size:13px}.stat-row strong{font-size:16px;color:#334155}.green{color:var(--green)!important}.orange{color:var(--orange)!important}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);background:#172033;color:#fff;padding:11px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:1100px){.layout{grid-template-columns:190px 1fr}.right-column{display:none}.topbar{grid-template-columns:1fr 1fr}.header-actions{display:none}}@media(max-width:760px){.topbar{height:auto;padding:18px;grid-template-columns:1fr}.layout{display:block;padding:0 14px;margin:16px auto}.answer-sheet{margin-bottom:14px}.question-grid{grid-template-columns:repeat(10,1fr)}.question-card{padding:24px 18px;min-height:600px}.bottom-actions{grid-template-columns:1fr 1fr}.auto-note{grid-column:1/-1;grid-row:1}.question-card h1{font-size:20px}}
.filters{max-width:1500px;margin:20px auto 0;padding:0 30px;display:flex;align-items:center;gap:14px}.filters label{display:flex;align-items:center;gap:8px;font-size:13px;color:#475569}.filters select{border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;color:#334155}.filters span{font-size:12px;color:#94a3b8;margin-left:4px}.short-answer{width:100%;min-height:210px;resize:vertical;border:1.5px solid var(--line);border-radius:12px;padding:16px;font:inherit;line-height:1.7;color:#334155;outline:none}.short-answer:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue2)}
.answer-sheet{max-height:720px;display:flex;flex-direction:column}.answer-sheet .question-grid{overflow-y:auto;align-content:start;padding-right:5px;scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}.question-grid::-webkit-scrollbar{width:6px}.question-grid::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}.filters{background:#fff;border:1px solid #e7edf6;border-radius:14px;padding:13px 18px;box-shadow:0 5px 20px rgba(30,64,175,.04)}.filters select{min-width:175px;font-weight:600;outline:none}.filters select:focus{border-color:#93b4fb;box-shadow:0 0 0 3px #eff6ff}@media(max-width:760px){.filters{margin:14px;display:grid;grid-template-columns:1fr 1fr}.filters span{grid-column:1/-1}.filters label{display:grid}.filters select{min-width:0;width:100%}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-icon">✓</span><span>刷题学习助手</span></div>
    <div class="progress-wrap">
      <div class="progress-copy"><strong id="progressText">第 1 / 5 题</strong><span id="progressPercent">20%</span></div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    </div>
    <div class="header-actions"><button class="ghost small">错题本 <b id="wrongCount">0</b></button><button class="ghost small">退出练习</button></div>
  </header>

  <div class="filters"><label>题库<select id="sourceFilter"></select></label><label>题型<select id="typeFilter"></select></label><span>答案已从 Word 题库中分离，提交后才会显示</span></div>
  <main class="layout">
    <aside class="panel answer-sheet">
      <div class="panel-title"><h2>答题卡</h2><span id="completedCount">0/5</span></div>
      <div id="questionGrid" class="question-grid" aria-label="题目导航"></div>
      <div class="legend"><span><i class="dot done"></i>已答</span><span><i class="dot current"></i>当前</span><span><i class="dot todo"></i>未答</span></div>
      <div class="sheet-tip">点击题号可以快速跳转</div>
    </aside>

    <section class="question-card">
      <div class="tags"><span id="questionType" class="tag blue">单选题</span><span id="category" class="tag">题库</span></div>
      <h1 id="questionTitle">题目加载中…</h1>
      <div id="options" class="options"></div>
      <p id="hint" class="hint">请选择一个答案</p>
      <section id="feedback" class="feedback hidden" aria-live="polite">
        <div class="feedback-head"><span id="feedbackIcon"></span><strong id="feedbackTitle"></strong></div>
        <p id="feedbackAnswer"></p><p id="explanation"></p>
      </section>
      <div class="bottom-actions">
        <button id="prevBtn" class="secondary">← 上一题</button>
        <span class="auto-note"><i></i>答对后自动进入下一题</span>
        <button id="submitBtn" class="primary">提交答案</button>
        <button id="nextBtn" class="secondary">下一题 →</button>
      </div>
    </section>

    <aside class="right-column">
      <section class="panel study-mode">
        <div class="mode-head"><h2>学习模式</h2><label class="switch"><input id="modeToggle" type="checkbox" checked><span></span></label></div>
        <div class="rule success"><b>✓</b><div><strong>答对</strong><small>自动进入下一题</small></div></div>
        <div class="rule warning"><b>!</b><div><strong>答错</strong><small>停留并显示解析</small></div></div>
        <div class="rule neutral"><b>↔</b><div><strong>自由切换</strong><small>随时返回上一题</small></div></div>
      </section>
      <section class="panel stats">
        <h2>本次练习</h2>
        <div class="stat-row"><span>正确</span><strong class="green" id="correctStat">0</strong></div>
        <div class="stat-row"><span>错误</span><strong class="orange" id="wrongStat">0</strong></div>
        <div class="stat-row"><span>正确率</span><strong id="accuracyStat">0%</strong></div>
      </section>
    </aside>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <script src="questions-data.js?v=4"></script><script src="app.js?v=2"></script>
</body>
</html>
